<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부동산 가치평가 시스템</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-900">
  <div class="max-w-7xl mx-auto p-5">
    <header class="mb-6 flex items-center justify-between gap-4 rounded-2xl bg-white p-5 shadow-sm border border-slate-200">
      <div>
        <h1 class="text-2xl font-extrabold">부동산 가치평가 시스템</h1>
        <p class="text-sm text-slate-500 mt-1">등기부등본 자동 분석 + 실거래가 기반 담보가치 산정</p>
      </div>

      <button onclick="savePDF()" class="rounded-xl bg-red-50 text-red-700 border border-red-200 px-4 py-2 text-sm font-bold">
        PDF 저장
      </button>
    </header>

    <main class="grid gap-6 lg:grid-cols-[420px_1fr]">
      <section class="space-y-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <h2 class="font-bold mb-3">1. 주소 입력</h2>
          <input id="address" class="w-full border border-slate-200 p-3 rounded-xl" placeholder="주소를 입력해주세요" />
          <p class="text-xs text-slate-500 mt-2">예: 전북특별자치도 전주시 완산구 화산천변로 55</p>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <h2 class="font-bold mb-3">2. 등기부등본 업로드</h2>

          <div class="rounded-2xl border-2 border-dashed border-blue-200 bg-blue-50 p-6 text-center">
            <div class="text-3xl mb-2">📄</div>
            <p class="font-bold">PDF 업로드</p>
            <label for="registryFile" class="inline-block mt-4 cursor-pointer rounded-xl bg-blue-700 px-4 py-2 text-sm font-bold text-white">파일 선택</label>

  <input
  id="registryFile"
  type="file"
  accept="application/pdf,image/*,.txt"
  class="hidden"
  onchange="handleFile(event)"
  />
          </div>

          <div id="fileStatus" class="mt-3 rounded-xl bg-slate-50 p-3 text-sm text-slate-600">업로드된 파일 없음</div>

          <button onclick="analyzeDocument()" class="mt-3 w-full rounded-xl bg-slate-900 text-white py-3 font-bold">
            문서 인식 및 자동 분석
          </button>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <h2 class="font-bold mb-3">3. 임차인 현황 입력</h2>

          <select id="tenant" class="w-full border border-slate-200 p-3 rounded-xl mb-3" onchange="toggleTenant()">
            <option>없음</option>
            <option>있음</option>
          </select>

          <div id="depositBox" class="space-y-3" style="display:none;">
            <div>
              <input id="jeonseDeposit" placeholder="전세보증금" class="w-full border border-slate-200 p-3 rounded-xl" oninput="formatInput(this, 'jeonseText')" />
              <p id="jeonseText" class="text-xs text-slate-500 mt-1"></p>
            </div>

            <div>
              <input id="leaseDeposit" placeholder="임차보증금" class="w-full border border-slate-200 p-3 rounded-xl" oninput="formatInput(this, 'leaseText')" />
              <p id="leaseText" class="text-xs text-slate-500 mt-1"></p>
            </div>

            <div>
              <input id="monthlyDeposit" placeholder="월세보증금" class="w-full border border-slate-200 p-3 rounded-xl" oninput="formatInput(this, 'monthlyText')" />
              <p id="monthlyText" class="text-xs text-slate-500 mt-1"></p>
            </div>
          </div>
        </div>

        <button onclick="calculate()" class="w-full bg-blue-700 hover:bg-blue-800 text-white px-4 py-4 rounded-2xl font-extrabold shadow-sm">
          결과 계산하기
        </button>
      </section>

      <section id="result" class="space-y-4"></section>
    </main>
  </div>

<script>
let registryText = '';
let lastParsedResult = null;

function formatMoney(n) {
  if (n === null || n === undefined || n === '') return '확인 필요';
  if (typeof n === 'string') return n;
  if (!Number.isFinite(n)) return '확인 필요';

  const sign = n < 0 ? '-' : '';
  const abs = Math.abs(n);

  if (abs >= 100000000) {
    const eok = Math.floor(abs / 100000000);
    const man = Math.floor((abs % 100000000) / 10000);
    return man ? `${sign}${eok}억 ${man.toLocaleString()}만원` : `${sign}${eok}억원`;
  }

  return `${sign}${abs.toLocaleString()}원`;
}

function parseMoney(v) {
  return Number(String(v || '').replace(/[^0-9]/g, '')) || 0;
}

function formatKoreanMoney(num) {
  if (!num) return '';
  const eok = Math.floor(num / 100000000);
  const man = Math.floor((num % 100000000) / 10000);

  if (eok > 0 && man > 0) return `${eok}억 ${man.toLocaleString()}만원`;
  if (eok > 0) return `${eok}억원`;
  if (man > 0) return `${man.toLocaleString()}만원`;
  return `${num.toLocaleString()}원`;
}

function formatInput(input, textId) {
  const raw = input.value.replace(/[^0-9]/g, '');

  if (!raw) {
    input.value = '';
    document.getElementById(textId).innerText = '';
    return;
  }

  const num = Number(raw);
  input.value = num.toLocaleString();
  document.getElementById(textId).innerText = `(${formatKoreanMoney(num)})`;
}

function toPyeong(m2) {
  const n = Number(String(m2 || '').replace(/[^0-9.]/g, ''));
  return n ? (n / 3.3058).toFixed(2) : null;
}

function areaWithPyeong(areaText) {
  const p = toPyeong(areaText);
  return p ? `${areaText} (${p}평)` : areaText;
}

function cleanText(t) {
  return String(t || '').replace(/\s+/g, '');
}

function normalizeSpaces(t) {
  return String(t || '')
    .replace(/\r/g, '')
    .replace(/[ \t]+/g, ' ')
    .replace(/\n\s+/g, '\n')
    .trim();
}

function getMatch(text, regex, fallback = '') {
  const match = text.match(regex);
  return match && match[1] ? String(match[1]).trim() : fallback;
}

function getLastMatch(text, regex, fallback = '') {
  const matches = Array.from(text.matchAll(regex));
  if (!matches.length) return fallback;
  const last = matches[matches.length - 1];
  return last && last[1] ? String(last[1]).trim() : fallback;
}

function extractBuildingName(raw) {
  const lines = String(raw || '').split('\n').map(v => v.trim()).filter(Boolean);

  const titleLine = lines.find(line =>
    line.includes('[집합건물]') &&
    line.includes('제') &&
    line.includes('동') &&
    !line.includes('소유자')
  );

  if (titleLine) {
    const cleaned = titleLine.replace('[집합건물]', '').trim();
    const m = cleaned.match(/(?:\d+(?:-\d+)?\s+)([가-힣A-Za-z0-9]+)\s+제\d+동/);
    if (m && m[1]) return m[1].trim();
  }

  const block = getMatch(
    raw,
    /【\s*표\s*제\s*부\s*】[\s\S]*?(?=【\s*갑\s*구\s*】|【\s*을\s*구\s*】|$)/,
    ''
  );

  const m2 = block.match(/([가-힣A-Za-z0-9]+)\s+제\d+동/);
  if (m2 && m2[1]) return m2[1].trim();

  return '확인 필요';
}

function toggleTenant() {
  const tenant = document.getElementById('tenant').value;
  const depositBox = document.getElementById('depositBox');
  depositBox.style.display = tenant === '없음' ? 'none' : 'block';

  if (tenant === '없음') {
    ['jeonseDeposit', 'leaseDeposit', 'monthlyDeposit'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });

    ['jeonseText', 'leaseText', 'monthlyText'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerText = '';
    });
  }
}

function extractMortgageList(raw) {
  const text = String(raw || '').replace(/\s+/g, ' ').trim();

  const start = text.indexOf('3. (근)저당권 및 전세권 등');
  if (start < 0) return [];

  const end = text.indexOf('[ 참 고 사 항 ]', start);
  const block = text.slice(start, end > start ? end : text.length);

  if (block.includes('기록사항 없음') && !block.includes('채권최고액')) {
    return [];
  }

  const rows = [];
  const parts = block.split(/(?=\d+\s+근저당권설정\s+\d{4}년)/g);

  parts.forEach(part => {
    if (!part.includes('채권최고액') || !part.includes('근저당권자')) return;

    const amountMatch = part.match(/채권최고액\s*금\s*([\d,]+)\s*원/);
    const lenderMatch = part.match(/근저당권자\s+([가-힣A-Za-z0-9\s]+?)(?=\s+\d+\s+근저당권설정|\s*\[|\s*가\.|$)/);

    if (!amountMatch || !lenderMatch) return;

    const amount = Number(amountMatch[1].replace(/,/g, '')) || 0;
    const lender = lenderMatch[1].replace(/\s+/g, '').trim();

    if (amount && lender) {
      rows.push({
        rank: rows.length + 1,
        lender,
        amount
      });
    }
  });

  return rows;
}

async function handleFile(event) {
  const input = event.target;
  const file = input.files && input.files[0];

  if (!file) {
    document.getElementById('fileStatus').innerHTML =
      `<span class="font-bold text-amber-700">선택된 파일이 없습니다.</span>`;
    return;
  }

  registryText = '';
  lastParsedResult = null;

  const fileName = file.name || '';
  const fileType = file.type || '';
  const lowerName = fileName.toLowerCase();

  const fileStatus = document.getElementById('fileStatus');
  const pdfPreview = document.getElementById('pdfPreview');

  if (pdfPreview) pdfPreview.innerHTML = '';

  fileStatus.innerHTML =
    `업로드 완료: ${fileName}<br><span class="text-slate-500">파일을 읽는 중입니다...</span>`;

  try {
    if (fileType === 'application/pdf' || lowerName.endsWith('.pdf')) {

      try {
        registryText = await extractTextFromPDF(file);
      } catch (pdfTextError) {
        registryText = '';
        fileStatus.innerHTML =
          `업로드 완료: ${fileName}<br><span class="text-amber-700 font-bold">PDF 미리보기는 표시했지만 텍스트 추출은 실패했습니다. 스캔본이면 OCR이 필요합니다.</span>`;
        input.value = '';
        return;
      }

    } else if (fileType.startsWith('image/') || lowerName.endsWith('.jpg') || lowerName.endsWith('.jpeg') || lowerName.endsWith('.png')) {
      await renderImagePreview(file);
      registryText = await extractTextFromImage(file);

    } else if (lowerName.endsWith('.txt')) {
      registryText = await readTextFile(file);

    } else {
      throw new Error('지원하지 않는 파일 형식입니다.');
    }

    if (registryText && registryText.trim().length > 30) {
      fileStatus.innerHTML =
        `업로드 완료: ${fileName}<br><span class="text-emerald-700 font-bold">문서 텍스트를 읽었습니다.</span>`;
    } else {
      fileStatus.innerHTML =
        `업로드 완료: ${fileName}<br><span class="text-amber-700 font-bold">파일은 업로드됐지만 추출된 텍스트가 부족합니다. 스캔본이면 이미지/OCR 방식이 필요합니다.</span>`;
    }

  } catch (error) {
    registryText = '';
    lastParsedResult = null;

    fileStatus.innerHTML =
      `<span class="font-bold text-amber-700">파일을 읽지 못했습니다: ${error.message || error}</span>`;
  }

  input.value = '';
}
  
async function renderPDFPreview(file) {
  const preview = document.getElementById('pdfPreview');
  if (!preview) return;

  if (!window.pdfjsLib) {
    preview.innerHTML = '<p class="text-amber-700 font-bold">PDF 미리보기를 불러오지 못했습니다.</p>';
    return;
  }

  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  preview.innerHTML = `
    <div class="rounded-2xl bg-white border border-slate-200 p-4">
      <p class="font-bold mb-3">업로드한 PDF 미리보기</p>
      <div id="pdfCanvasBox" class="space-y-4"></div>
    </div>
  `;

  const box = document.getElementById('pdfCanvasBox');
  const buffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buffer }).promise;

  for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
    const page = await pdf.getPage(pageNumber);
    const viewport = page.getViewport({ scale: 1.25 });

    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');

    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.className = 'w-full rounded-xl border border-slate-200 bg-white shadow-sm';

    await page.render({
      canvasContext: context,
      viewport
    }).promise;

    box.appendChild(canvas);
  }
}

function readTextFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(String(e.target.result || ''));
    reader.onerror = () => reject(new Error('텍스트 파일 읽기 실패'));
    reader.readAsText(file, 'utf-8');
  });
}

async function extractTextFromPDF(file) {
  if (!window.pdfjsLib) throw new Error('PDF.js 라이브러리를 불러오지 못했습니다.');
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const buffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buffer }).promise;
  const pages = [];

  for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
    const page = await pdf.getPage(pageNumber);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str || '').join(' ');
    pages.push(pageText);
  }

  return pages.join('\n');
}

async function extractTextFromImage(file) {
  if (!window.Tesseract) throw new Error('Tesseract OCR 라이브러리를 불러오지 못했습니다.');
  document.getElementById('fileStatus').innerHTML += `<br><span class="text-slate-500">OCR 처리 중입니다...</span>`;
  const result = await window.Tesseract.recognize(file, 'kor+eng');
  return result && result.data ? result.data.text || '' : '';
}

function validateRegistryDocument(text) {
  if (!text || text.trim().length < 20) {
    return { status: 'OCR 실패', tone: 'yellow', found: [] };
  }

  const compact = cleanText(text);
  const keywords = [
    '등기사항전부증명서',
    '등기사항일부증명서',
    '집합건물',
    '표제부',
    '갑구',
    '을구',
    '고유번호',
    '전유부분의건물의표시',
    '대지권의표시',
    '주요등기사항요약'
  ];

  const found = keywords.filter(k => compact.includes(k));

  if (found.length >= 5) return { status: '등기부등본 확실', tone: 'green', found };
  if (found.length >= 2) return { status: '등기부등본 가능', tone: 'yellow', found };
  return { status: '문서 유형 확인 필요', tone: 'yellow', found };
}

function parseRegistry(text) {
  const raw = normalizeSpaces(text);
  const compact = cleanText(raw);
  const validation = validateRegistryDocument(raw);
  const apartmentName = extractBuildingName(raw);

  let owner = '확인 필요';

  const ownerStart = raw.indexOf('1. 소유지분현황');
  const ownerEnd1 = raw.indexOf('2. 소유지분을 제외한', ownerStart);
  const ownerEnd2 = raw.indexOf('3. (근)', ownerStart);
  const ownerEnd3 = raw.indexOf('참 고 사 항', ownerStart);

  const ownerEnds = [ownerEnd1, ownerEnd2, ownerEnd3].filter(index => index > ownerStart);
  const ownerEnd = ownerEnds.length ? Math.min.apply(null, ownerEnds) : ownerStart + 500;
  const ownerBlock = ownerStart >= 0 ? raw.slice(ownerStart, ownerEnd) : '';

  const ownerInSummary = ownerBlock.match(/([가-힣]{2,5})\s*\(\s*소유자\s*\)/);

  if (ownerInSummary && ownerInSummary[1]) {
    owner = ownerInSummary[1].trim();
  }

  if (owner === '확인 필요') {
    const ownerInGap = getLastMatch(raw, /소유자\s+([가-힣]{2,5})/g, '');
    if (ownerInGap) owner = ownerInGap;
  }

  if (['혹은', '공유자', '현황', '확인', '지분', '변경', '말소'].includes(owner)) {
    owner = '확인 필요';
  }

  const unitRaw = getMatch(raw, /(제\s*\d+층\s*제\s*\d+호)/, '확인 필요');
  const unitNumber = unitRaw.replace(/\s+/g, ' ');
  const currentFloor = Number(getMatch(unitNumber, /제\s*(\d+)층/, '0'));

  let exclusiveSection = getMatch(
    raw,
    /전유부분의 건물의 표시[\s\S]*?(?:건 물 내 역|건물내역)([\s\S]*?)(?:\( 대지권의 표시 \)|대지권의 표시|【 갑 구 】|【 을 구 】|$)/,
    ''
  );

  if (!exclusiveSection) {
    exclusiveSection = getMatch(
      raw,
      /전유부분의 건물의 표시[\s\S]*?(제\s*\d+층\s*제\s*\d+호[\s\S]*?㎡)/,
      ''
    );
  }

  const areaValue = getMatch(exclusiveSection, /(\d+(?:\.\d+)?)\s*㎡/, '');

  const structureFloor =
    Number(getMatch(raw, /지붕\s*(\d+)층/, '0')) ||
    Number(getMatch(raw, /구조[\s\S]{0,40}?(\d+)층/, '0'));

  const floorNumbers = Array.from(
    raw.matchAll(/(?:^|\n|\s)(\d+)층\s+\d+(?:\.\d+)?㎡/g)
  ).map(m => Number(m[1]));

  const totalFloors = structureFloor || (floorNumbers.length ? Math.max(...floorNumbers) : 0);
  const hasTenantRight = /전세권설정|임차권등기|주택임차권|임차권설정/.test(raw);

  const mortgageList = extractMortgageList(raw);
  const seniorMortgageAmount = mortgageList.reduce((sum, item) => sum + item.amount, 0);

  const mortgageStatus =
    mortgageList.length > 0
      ? '유효 근저당 있음'
      : '유효 근저당 없음';

  return {
    documentValidation: validation,
    owner,
    apartmentName,
    buildingType: compact.includes('집합건물') ? '집합건물' : compact.includes('건물') ? '건물' : '확인 필요',
    detailType: compact.includes('아파트') ? '아파트' : compact.includes('오피스텔') ? '오피스텔' : compact.includes('상가') ? '상가' : '확인 필요',
    unitNumber,
    exclusiveArea: areaValue ? `${areaValue}㎡` : '확인 필요',
    areaNumber: Number(areaValue || 0),
    currentFloor,
    totalFloors,
    medianFloor: totalFloors ? totalFloors / 2 : 0,
    registryTenantStatus: hasTenantRight ? '등기부상 임차권리 있음' : '등기부상 확인 불가',
    mortgageStatus,
    seniorMortgageAmount,
    mortgageList
  };
}

function analyzeDocument() {
  if (!registryText) {
    document.getElementById('fileStatus').innerHTML =
      `<span class="font-bold text-amber-700">등기부등본 파일을 먼저 업로드해주세요.</span>`;
    return;
  }

  const validation = validateRegistryDocument(registryText);
  const color = validation.tone === 'green' ? 'emerald' : 'amber';

  document.getElementById('fileStatus').innerHTML =
    `<span class="font-bold text-${color}-700">${validation.status}</span> · 감지 키워드 ${validation.found.length}개`;
}

async function fetchOfficialPriceFromApi(address, parsed) {
  const response = await fetch('/api/transactions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      address,
      aptName: parsed.apartmentName === '확인 필요' ? '' : parsed.apartmentName,
      unitNumber: parsed.unitNumber,
      exclusiveArea: parsed.exclusiveArea,
      currentFloor: parsed.currentFloor,
      totalFloors: parsed.totalFloors,
      area: parsed.areaNumber
    })
  });

  return await response.json();
}

async function getMarketAnalysis(address, parsed) {
  try {
    const data = await fetchOfficialPriceFromApi(address, parsed);
    const investigationPrice = Number(data.investigationPrice || 0);

    if (!investigationPrice) {
      throw new Error(data.message || '실거래가 데이터 없음');
    }

    return {
      marketPriceSource: data.source || '공공데이터포털 실거래가 API',
      lawdCode: data.lawdCode || '',
      transactionCount: data.transactionCount || 0,
      usedTransactionCount: data.usedTransactionCount || 0,
      totalRawCount: data.totalRawCount || 0,
      upperPrice: data.upperPrice || null,
      middlePrice: data.middlePrice || null,
      lowerPrice: data.lowerPrice || null,
      appliedPriceType: data.appliedPriceType || '하위값',
      investigationPrice,
      apiConnected: true,
      errorMessage: data.message || ''
    };
  } catch (error) {
    return {
      marketPriceSource: '공공데이터포털 실거래가 API',
      lawdCode: '',
      transactionCount: 0,
      usedTransactionCount: 0,
      totalRawCount: 0,
      upperPrice: null,
      middlePrice: null,
      lowerPrice: null,
      appliedPriceType: '데이터 부재',
      investigationPrice: null,
      apiConnected: false,
      errorMessage: error.message || '실거래가 API 연결 실패'
    };
  }
}

function calculateCostApproach(areaText) {
  const area = Number(String(areaText).replace(/[^0-9.]/g, '')) || 0;
  if (!area) return null;

  const replacementCostPerSqm = 5200000;
  const depreciationRate = 0.32;
  const landContribution = 360000000;

  return Math.round(area * replacementCostPerSqm * (1 - depreciationRate) + landContribution);
}

function calculateIncomeApproach() {
  const monthlyRentEstimate = 2300000;
  const annualNetIncome = monthlyRentEstimate * 12 * 0.82;
  const capRate = 0.042;

  return Math.round(annualNetIncome / capRate);
}

function calculateWeightedAppraisal(salesValue, incomeValue, costValue) {
  if (!Number.isFinite(salesValue)) return null;

  const safeIncome = Number.isFinite(incomeValue) ? incomeValue : 0;
  const safeCost = Number.isFinite(costValue) ? costValue : 0;

  return Math.round(
    salesValue * 0.7 +
    safeIncome * 0.2 +
    safeCost * 0.1
  );
}

function calculatePriorityRepayment(address, propertyType, deposit) {
  if (!deposit || deposit <= 0) return 0;

  const isCommercial = propertyType && propertyType.includes('상가');

  if (isCommercial) {
    if (address.includes('서울')) return deposit <= 65000000 ? 22000000 : 0;
    if (address.includes('세종') || address.includes('용인시') || address.includes('화성시') || address.includes('김포시')) return deposit <= 55000000 ? 19000000 : 0;
    if (address.includes('광역시') || address.includes('안산시') || address.includes('용인시') || address.includes('김포시') || address.includes('광주시')) return deposit <= 38000000 ? 13000000 : 0;
    return deposit <= 30000000 ? 10000000 : 0;
  }

  if (address.includes('서울')) return deposit <= 165000000 ? 55000000 : 0;
  if (address.includes('세종') || address.includes('용인시') || address.includes('화성시') || address.includes('김포시')) return deposit <= 145000000 ? 48000000 : 0;
  if (address.includes('광역시') || address.includes('안산시') || address.includes('광주시') || address.includes('파주시') || address.includes('이천시') || address.includes('평택시')) return deposit <= 85000000 ? 28000000 : 0;

  return deposit <= 75000000 ? 25000000 : 0;
}

  if (!address) {
    document.getElementById('result').innerHTML =
      card('입력 오류', '<p class="text-amber-700 font-bold">주소를 먼저 입력해주세요.</p>');

    return;

  const tenant = document.getElementById('tenant').value;

  const deposit = tenant === '없음' ? 0 : Math.max(
    parseMoney(document.getElementById('jeonseDeposit').value),
    parseMoney(document.getElementById('leaseDeposit').value),
    parseMoney(document.getElementById('monthlyDeposit').value)
  );

  const salesComparisonValue = market.investigationPrice;
  const costApproach = calculateCostApproach(parsed.exclusiveArea);
  const incomeApproach = calculateIncomeApproach();

  const weightedAppraisalValue = calculateWeightedAppraisal(
    salesComparisonValue,
    incomeApproach,
    costApproach
  );

  const collateralLtvRate = 0.7;

  const collateralBase = Number.isFinite(weightedAppraisalValue)
    ? Math.round(weightedAppraisalValue * collateralLtvRate)
    : null;

  const priorityRepayment = tenant === '없음'
    ? 0
    : calculatePriorityRepayment(address, parsed.detailType, deposit);

  const finalValue = Number.isFinite(collateralBase)

        ${summaryCard('3단계 최종 담보가치', formatMoney(finalValue), '보증금·최우선변제금·선순위 차감 후', 'dark')}
      </div>

      ${card('문서 판별 상태', `

        </div>
      `)}

      ${card('자동 추출 결과', grid([
        ['주소', address],
        ['소유자', parsed.owner],
        ['아파트/단지명', parsed.apartmentName],
        ['건물유형', `${parsed.buildingType} / ${parsed.detailType}`],
        ['건물번호', parsed.unitNumber],
        ['전유면적', areaWithPyeong(parsed.exclusiveArea)],
        ['해당 층', parsed.currentFloor ? `${parsed.currentFloor}층` : '확인 필요'],
        ['총 층수', parsed.totalFloors ? `${parsed.totalFloors}층` : '확인 필요'],
        ['중위층', parsed.medianFloor ? `${parsed.medianFloor}층` : '확인 필요'],
        ['등기부상 임차권리', parsed.registryTenantStatus],
        ['근저당 현황', parsed.mortgageStatus],
        ['선순위 근저당', formatMoney(parsed.seniorMortgageAmount)]
      ]))}

      ${card('근저당권 현황', `
        ${mortgageTable(parsed.mortgageList)}
        <p class="mt-3 font-bold">선순위 근저당 합계: ${formatMoney(parsed.seniorMortgageAmount)}</p>
      `)}

      ${card('실거래가 분석 결과', grid([
        ['시세 출처', market.marketPriceSource],
        ['법정동코드', market.lawdCode || '확인 필요'],
        ['API 메시지', market.errorMessage || '정상'],
        ['전체 원자료 건수', `${market.totalRawCount || 0}건`],
        ['유사 거래 건수', `${market.transactionCount || 0}건`],
        ['산정 사용 건수', `${market.usedTransactionCount || 0}건`],
        ['상위값', `${formatMoney(market.upperPrice)} / 이상치로 산정 제외`],
        ['중위값', formatMoney(market.middlePrice)],
        ['하위값', formatMoney(market.lowerPrice)],
        ['적용 시세', market.appliedPriceType]
      ]))}

${card('감정평가 3방식 비교', `
  ${methodTabs(
    `
      <p class="font-bold mb-4">거래사례비교법은 인근 유사 거래사례를 기준으로 시산가액을 산정합니다.</p>
      <div class="rounded-xl bg-slate-50 p-4">
        <p>상위값: ${formatMoney(market.upperPrice)} / 이상치 제외</p>
        <p>중위값: ${formatMoney(market.middlePrice)}</p>
        <p>하위값: ${formatMoney(market.lowerPrice)}</p>
        <p>적용 시세: ${market.appliedPriceType}</p>
        <p class="mt-3 font-bold">거래사례비교법 시산가액: ${formatMoney(salesComparisonValue)}</p>
      </div>
    `,
    `
      <p class="font-bold mb-4">수익환원법은 예상 임대수익을 환원율로 나누어 가치를 산정합니다.</p>
      <div class="rounded-xl bg-slate-50 p-4">
        <p>월 임대료 추정: ${formatMoney(2300000)}</p>
        <p>연간 순수익: ${formatMoney(2300000 * 12 * 0.82)}</p>
        <p>환원율: 4.2%</p>
        <p class="mt-3 font-bold">수익환원법 시산가액: ${formatMoney(incomeApproach)}</p>
      </div>
    `,
    `
      <p class="font-bold mb-4">원가법은 토지기여액과 건물 재조달원가를 기준으로 가치를 산정합니다.</p>
      <div class="rounded-xl bg-slate-50 p-4">
        <p>전유면적: ${parsed.exclusiveArea}</p>
        <p>재조달원가: ㎡당 ${formatMoney(5200000)}</p>
        <p>감가율: 32%</p>
        <p>토지기여액: ${formatMoney(360000000)}</p>
        <p class="mt-3 font-bold">원가법 시산가액: ${formatMoney(costApproach)}</p>
      </div>
    `
  )}
`)}

      ${card('1단계 감정평가 3방식 종합 및 시산가액 조정', `
        ${appraisalTable({
          salesComparisonValue,
          incomeApproach,
          costApproach,
          weightedAppraisalValue
        })}
      `)}

      ${card('2단계 담보 인정가 산정', `
        <p>담보 인정가 = 1단계 시산가액 × LTV 70%</p>
        <p><b>${formatMoney(weightedAppraisalValue)} × 70% = ${formatMoney(collateralBase)}</b></p>
      `)}

      ${card('3단계 권리 차감 후 최종 담보가치', `
        <p>담보 인정가 = <b>${formatMoney(collateralBase)}</b></p>
        <p>적용 임차보증금 = <b>${formatMoney(deposit)}</b></p>
        <p>최우선변제금 = <b>${formatMoney(priorityRepayment)}</b></p>
        <p>선순위 근저당 = <b>${formatMoney(parsed.seniorMortgageAmount)}</b></p>
        <p class="mt-3 rounded-xl bg-blue-50 p-3 font-bold text-blue-900">
          최종 담보가치 = ${formatMoney(collateralBase)} - ${formatMoney(deposit)} - ${formatMoney(priorityRepayment)} - ${formatMoney(parsed.seniorMortgageAmount)}
          = ${formatMoney(finalValue)}
        </p>
      `)}

      ${card('유의사항', `
        <ul class="list-disc pl-5 text-sm text-slate-600 space-y-1">

}

    ? 'bg-blue-700 text-white'
    : 'bg-white text-slate-900 border border-slate-200';

  const subCls = type === 'dark' ? 'text-blue-100' : 'text-slate-500';

  return `
    <div class="rounded-2xl p-5 shadow-sm ${cls}">
      <p class="text-sm ${subCls}">${title}</p>
      <p class="text-2xl font-black mt-2">${value}</p>
      <p class="text-xs ${subCls} mt-1">${sub}</p>

  const tabs = ['salesTab', 'incomeTab', 'costTab'];

  tabs.forEach(id => {

    if (el) {
      el.className = id === tabId
        ? 'px-4 py-3 border border-slate-300 border-b-white bg-white font-bold text-slate-900 rounded-t-xl'
        : 'px-4 py-3 border border-slate-300 bg-slate-100 text-slate-500 rounded-t-xl';
    }
  });

  contents.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = id.startsWith(tabId.replace('Tab', '')) ? 'block' : 'none';
