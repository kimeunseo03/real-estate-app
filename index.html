<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부동산 가치평가 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-7xl mx-auto p-5">
    <header class="mb-6 flex items-center justify-between gap-4 rounded-2xl bg-white p-5 shadow-sm border border-slate-200">
      <div>
        <h1 class="text-2xl font-extrabold">부동산 가치평가 시스템</h1>
      </div>
      <span class="rounded-full bg-blue-50 text-blue-700 px-3 py-1 text-sm font-bold border border-blue-200">참고용 추정 결과</span>
    </header>

    <main class="grid gap-6 lg:grid-cols-[420px_1fr]">
      <section class="space-y-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <h2 class="font-bold mb-3">1. 주소 입력</h2>
          <label class="block">
            <span class="text-sm text-slate-600">주소</span>
            <input id="address" class="mt-1 w-full border border-slate-200 p-3 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100" placeholder="주소를 입력해주세요" />
          </label>
          <p class="text-xs text-slate-500 mt-2">입력 주소와 등기부등본 주소가 다르면 경고를 표시합니다.</p>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <h2 class="font-bold mb-3">2. 등기부등본 업로드</h2>
          <div class="rounded-2xl border-2 border-dashed border-blue-200 bg-blue-50 p-6 text-center hover:bg-blue-100">
            <div class="text-3xl mb-2">📄</div>
            <p class="font-bold">PDF / JPG / PNG 파일 업로드</p>
            <p class="text-xs text-slate-500 mt-1">등기부등본 파일을 업로드해주세요.</p>
            <button type="button" onclick="document.getElementById('registryFile').click()" class="mt-4 rounded-xl bg-blue-700 px-4 py-2 text-sm font-bold text-white">파일 선택</button>
            <input id="registryFile" type="file" accept=".pdf,.jpg,.jpeg,.png,.txt" style="display:none" onchange="handleFile(event)" />
          </div>
          <div id="fileStatus" class="mt-3 rounded-xl bg-slate-50 p-3 text-sm text-slate-600">업로드된 파일 없음</div>
          <button onclick="analyzeDocument()" class="mt-3 w-full rounded-xl bg-slate-900 text-white py-3 font-bold">문서 인식 및 자동 분석</button>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-bold">3. 임차인 현황 입력</h2>
            <span id="tenantBadge" class="rounded-full bg-blue-50 text-blue-700 px-2 py-1 text-xs font-bold border border-blue-200">보증금 0원</span>
          </div>
          <label class="block">
            <span class="text-sm text-slate-600">임차인 여부</span>
            <select id="tenant" class="mt-1 w-full border border-slate-200 p-3 rounded-xl" onchange="toggleTenant()">
              <option>없음</option>
              <option>있음</option>
            </select>
          </label>
          <div id="depositBox" class="mt-3 space-y-3" style="display:none;">
            <input id="jeonseDeposit" placeholder="전세보증금" class="w-full border border-slate-200 p-3 rounded-xl" />
            <input id="leaseDeposit" placeholder="임차보증금" class="w-full border border-slate-200 p-3 rounded-xl" />
            <input id="monthlyDeposit" placeholder="월세보증금" class="w-full border border-slate-200 p-3 rounded-xl" />
          </div>
          <p class="text-xs text-slate-500 mt-2">임차인 없음 선택 시 보증금은 0원으로 계산하며 입력칸은 숨깁니다.</p>
        </div>

        <button onclick="calculate()" class="w-full bg-blue-700 hover:bg-blue-800 text-white px-4 py-4 rounded-2xl font-extrabold shadow-sm">결과 계산하기</button>
      </section>

      <section id="result" class="space-y-4"></section>
    </main>
  </div>

<script>
let registryText = '';

function formatMoney(n) {
  if (n === null || n === undefined || n === '') return '확인 필요';
  if (typeof n === 'string') return n;
  if (!Number.isFinite(n)) return '확인 필요';
  if (n >= 100000000) {
    const eok = Math.floor(n / 100000000);
    const man = Math.floor((n % 100000000) / 10000);
    return man ? `${eok}억 ${man.toLocaleString()}만원` : `${eok}억원`;
  }
  return `${Math.max(0, n).toLocaleString()}원`;
}

function parseMoney(v) {
  return Number(String(v || '').replace(/[^0-9]/g, '')) || 0;
}

function cleanText(t) {
  return String(t || '').replace(/\s+/g, '');
}

function normalizeSpaces(t) {
  return String(t || '').replace(/\r/g, '').replace(/[ \t]+/g, ' ').replace(/\n\s+/g, '\n').trim();
}

function getMatch(text, regex, fallback = '') {
  const match = text.match(regex);
  return match && match[1] ? String(match[1]).trim() : fallback;
}

function getLastMatch(text, regex, fallback = '') {
  const matches = Array.from(text.matchAll(regex));
  if (!matches.length) return fallback;
  const last = matches[matches.length - 1];
  return last && last[1] ? String(last[1]).trim() : fallback;
}

function toggleTenant() {
  const tenant = document.getElementById('tenant').value;
  const depositBox = document.getElementById('depositBox');
  const tenantBadge = document.getElementById('tenantBadge');
  depositBox.style.display = tenant === '없음' ? 'none' : 'block';
  tenantBadge.className = tenant === '없음'
    ? 'rounded-full bg-blue-50 text-blue-700 px-2 py-1 text-xs font-bold border border-blue-200'
    : 'rounded-full bg-emerald-50 text-emerald-700 px-2 py-1 text-xs font-bold border border-emerald-200';
  tenantBadge.innerText = tenant === '없음' ? '보증금 0원' : '계산 반영';
}

async function handleFile(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  registryText = '';
  document.getElementById('result').innerHTML = card('파일 업로드 완료', '<p class="text-slate-600">문서 인식 및 자동 분석을 진행해주세요.</p>');

  const fileName = file.name || '';
  const lowerName = fileName.toLowerCase();
  document.getElementById('fileStatus').innerHTML = `업로드 완료: ${fileName}<br><span class="text-slate-500">문서 텍스트를 읽는 중입니다...</span>`;

  try {
    if (lowerName.endsWith('.txt')) {
      registryText = await readTextFile(file);
      document.getElementById('fileStatus').innerHTML = `업로드 완료: ${fileName}<br><span class="text-emerald-700 font-bold">텍스트 파일을 읽었습니다.</span>`;
      return;
    }

    if (lowerName.endsWith('.pdf')) {
      registryText = await extractTextFromPDF(file);
      if (registryText && registryText.trim().length > 30) {
        document.getElementById('fileStatus').innerHTML = `업로드 완료: ${fileName}<br><span class="text-emerald-700 font-bold">PDF 내부 텍스트를 읽었습니다.</span>`;
      } else {
        document.getElementById('fileStatus').innerHTML = `업로드 완료: ${fileName}<br><span class="text-amber-700 font-bold">PDF 텍스트가 부족합니다. 스캔 PDF일 수 있습니다.</span>`;
      }
      return;
    }

    if (lowerName.endsWith('.jpg') || lowerName.endsWith('.jpeg') || lowerName.endsWith('.png')) {
      registryText = await extractTextFromImage(file);
      if (registryText && registryText.trim().length > 30) {
        document.getElementById('fileStatus').innerHTML = `업로드 완료: ${fileName}<br><span class="text-emerald-700 font-bold">이미지 OCR 텍스트를 읽었습니다.</span>`;
      } else {
        document.getElementById('fileStatus').innerHTML = `업로드 완료: ${fileName}<br><span class="text-amber-700 font-bold">OCR 결과가 부족합니다. 이미지 품질을 확인해주세요.</span>`;
      }
      return;
    }

    document.getElementById('fileStatus').innerHTML = `<span class="font-bold text-amber-700">지원하지 않는 파일 형식입니다.</span>`;
  } catch (error) {
    registryText = '';
    document.getElementById('fileStatus').innerHTML = `<span class="font-bold text-amber-700">파일을 읽지 못했습니다: ${error.message || error}</span>`;
  }
}

function readTextFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(e) { resolve(String(e.target.result || '')); };
    reader.onerror = function() { reject(new Error('텍스트 파일 읽기 실패')); };
    reader.readAsText(file, 'utf-8');
  });
}

async function extractTextFromPDF(file) {
  if (!window.pdfjsLib) throw new Error('PDF.js 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.');
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buffer }).promise;
  const pages = [];
  for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
    const page = await pdf.getPage(pageNumber);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str || '').join(' ');
    pages.push(pageText);
  }
  return pages.join('\n');
}

async function extractTextFromImage(file) {
  if (!window.Tesseract) throw new Error('Tesseract OCR 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.');
  document.getElementById('fileStatus').innerHTML += `<br><span class="text-slate-500">OCR 처리 중입니다. 시간이 걸릴 수 있습니다...</span>`;
  const result = await window.Tesseract.recognize(file, 'kor+eng');
  return result && result.data ? result.data.text || '' : '';
}

function validateRegistryDocument(text) {
  if (!text || text.trim().length < 20) return { status: 'OCR 실패', tone: 'yellow', found: [] };
  const compact = cleanText(text);
  const keywords = ['등기사항전부증명서','등기사항일부증명서','집합건물','표제부','갑구','을구','고유번호','열람일시','관할등기소','전유부분의건물의표시','대지권의표시','주요등기사항요약'];
  const found = keywords.filter(k => compact.includes(k));
  if (found.length >= 5) return { status: '등기부등본 확실', tone: 'green', found };
  if (found.length >= 2) return { status: '등기부등본 가능', tone: 'yellow', found };
  return { status: '문서 유형 확인 필요', tone: 'yellow', found };
}

function parseRegistry(text) {
  const raw = normalizeSpaces(text);
  const compact = cleanText(raw);
  const validation = validateRegistryDocument(raw);

  let owner = '확인 필요';

const ownerStart = raw.indexOf('1. 소유지분현황');
const ownerEnd1 = raw.indexOf('2. 소유지분을 제외한', ownerStart);
const ownerEnd2 = raw.indexOf('3. (근)', ownerStart);
const ownerEnd3 = raw.indexOf('참 고 사 항', ownerStart);

const ownerEnds = [ownerEnd1, ownerEnd2, ownerEnd3].filter(function (index) {
  return index > ownerStart;
});

const ownerEnd = ownerEnds.length
  ? Math.min.apply(null, ownerEnds)
  : ownerStart + 500;

const ownerBlock = ownerStart >= 0 ? raw.slice(ownerStart, ownerEnd) : '';

const ownerInSummary = ownerBlock.match(/([가-힣]{2,5})\s*\(\s*소유자\s*\)/);

if (ownerInSummary && ownerInSummary[1]) {
  owner = ownerInSummary[1].trim();
}

if (owner === '확인 필요') {
  const ownerInGap = getLastMatch(raw, /소유자\s+([가-힣]{2,5})/g, '');
  if (ownerInGap) owner = ownerInGap;
}

if (['혹은', '공유자', '현황', '확인', '지분', '변경', '말소'].includes(owner)) {
  owner = '확인 필요';
}

  const unitRaw = getMatch(raw, /(제\s*\d+층\s*제\s*\d+호)/, '확인 필요');
  const unitNumber = unitRaw.replace(/\s+/g, ' ');
  const currentFloor = Number(getMatch(unitNumber, /제\s*(\d+)층/, '0'));

  let exclusiveSection = getMatch(raw, /전유부분의 건물의 표시[\s\S]*?(?:건 물 내 역|건물내역)([\s\S]*?)(?:\( 대지권의 표시 \)|대지권의 표시|【 갑 구 】|【 을 구 】|$)/, '');
  if (!exclusiveSection) exclusiveSection = getMatch(raw, /전유부분의 건물의 표시[\s\S]*?(제\s*\d+층\s*제\s*\d+호[\s\S]*?㎡)/, '');
  const areaValue = getMatch(exclusiveSection, /(\d+(?:\.\d+)?)\s*㎡/, '');

  const structureFloor = Number(getMatch(raw, /지붕\s*(\d+)층/, '0')) || Number(getMatch(raw, /구조[\s\S]{0,40}?(\d+)층/, '0'));
  const floorNumbers = Array.from(raw.matchAll(/(?:^|\n|\s)(\d+)층\s+\d+(?:\.\d+)?㎡/g)).map(m => Number(m[1]));
  const totalFloors = structureFloor || (floorNumbers.length ? Math.max(...floorNumbers) : 0);

  const hasTenantRight = /전세권설정|임차권등기|주택임차권|임차권설정/.test(raw);
  const hasNoMortgageSummary = compact.includes('기록사항없음') && (compact.includes('저당권및전세권') || compact.includes('근)저당권및전세권'));
  const hasMortgageSetting = /근저당권설정/.test(raw);
  const hasMortgageCancel = /근저당권설정[\s\S]*?(근저당권설정등기말소|근저당권설정등|해지)/.test(raw);
  const mortgageStatus = hasNoMortgageSummary || (hasMortgageSetting && hasMortgageCancel)
    ? '현재 유효한 근저당 없음'
    : hasMortgageSetting
      ? '근저당 확인 필요'
      : '현재 유효한 근저당 없음';

  return {
    documentValidation: validation,
    owner,
    buildingType: compact.includes('집합건물') ? '집합건물' : compact.includes('건물') ? '건물' : '확인 필요',
    detailType: compact.includes('아파트') ? '아파트' : compact.includes('오피스텔') ? '오피스텔' : compact.includes('상가') ? '상가' : '확인 필요',
    unitNumber,
    exclusiveArea: areaValue ? `${areaValue}㎡` : '확인 필요',
    currentFloor,
    totalFloors,
    medianFloor: totalFloors ? totalFloors / 2 : 0,
    registryTenantStatus: hasTenantRight ? '등기부상 임차권리 있음' : '등기부상 확인 불가',
    mortgageStatus,
    seniorMortgageAmount: mortgageStatus === '현재 유효한 근저당 없음' ? 0 : null
  };
}

function analyzeDocument() {
  if (!registryText) {
    document.getElementById('fileStatus').innerHTML = `<span class="font-bold text-amber-700">등기부등본 파일을 먼저 업로드해주세요.</span>`;
    return;
  }
  const validation = validateRegistryDocument(registryText);
  const color = validation.tone === 'green' ? 'emerald' : 'amber';
  document.getElementById('fileStatus').innerHTML = `<span class="font-bold text-${color}-700">${validation.status}</span> · 감지 키워드 ${validation.found.length}개`;
}

async function fetchOfficialPriceFromApi(address, parsed) {
  const area = Number(String(parsed.exclusiveArea || '').replace(/[^0-9.]/g, ''));

  const response = await fetch('/api/transactions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      address,
      unitNumber: parsed.unitNumber,
      exclusiveArea: parsed.exclusiveArea,
      currentFloor: parsed.currentFloor,
      totalFloors: parsed.totalFloors,
      area
    })
  });

  if (!response.ok) throw new Error('실거래가 API 응답 실패');
  return await response.json();
}

async function getMarketAnalysis(address, parsed) {
  try {
    const data = await fetchOfficialPriceFromApi(address, parsed);

    const investigationPrice = Number(data.investigationPrice || 0);

    if (!investigationPrice) {
      throw new Error(data.message || '실거래가 데이터 없음');
    }

    return {
      marketPriceSource: data.source || '공공데이터포털 실거래가 API',
      transactionCount: data.transactionCount || 0,
      upperPrice: data.upperPrice || null,
      middlePrice: data.middlePrice || null,
      lowerPrice: data.lowerPrice || null,
      appliedPriceType: data.appliedPriceType || '하위값',
      investigationPrice,
      apiConnected: true,
      errorMessage: ''
    };
  } catch (error) {
    return {
      marketPriceSource: '실거래가 API 연결 필요',
      transactionCount: 0,
      upperPrice: null,
      middlePrice: null,
      lowerPrice: null,
      appliedPriceType: '데이터 부재',
      investigationPrice: null,
      apiConnected: false,
      errorMessage: error.message || '실거래가 API 연결 실패'
    };
  }
}

function calculateCostApproach(areaText) {
  const area = Number(String(areaText).replace(/[^0-9.]/g, '')) || 0;
  if (!area) return null;
  const replacementCostPerSqm = 5200000;
  const depreciationRate = 0.32;
  const landContribution = 360000000;
  return Math.round(area * replacementCostPerSqm * (1 - depreciationRate) + landContribution);
}

function calculateIncomeApproach() {
  const monthlyRentEstimate = 2300000;
  const annualNetIncome = monthlyRentEstimate * 12 * 0.82;
  const capRate = 0.042;
  return Math.round(annualNetIncome / capRate);
}

async function calculate() {
  const address = document.getElementById('address').value.trim();
  if (!address) {
    document.getElementById('result').innerHTML = card('입력 오류', '<p class="text-amber-700 font-bold">주소를 먼저 입력해주세요.</p>');
    return;
  }
  if (!registryText) {
    document.getElementById('result').innerHTML = card('입력 오류', '<p class="text-amber-700 font-bold">등기부등본 파일을 먼저 업로드해주세요.</p>');
    return;
  }

  const parsed = parseRegistry(registryText);
  document.getElementById('result').innerHTML = card('계산 중', '<p class="text-slate-600">공시가격 API를 조회하고 있습니다...</p>');
  const market = await getMarketAnalysis(address, parsed);
  const tenant = document.getElementById('tenant').value;
  const deposit = tenant === '없음' ? 0 : Math.max(
    parseMoney(document.getElementById('jeonseDeposit').value),
    parseMoney(document.getElementById('leaseDeposit').value),
    parseMoney(document.getElementById('monthlyDeposit').value)
  );

  const collateralBase = Number.isFinite(market.investigationPrice) ? Math.round(market.investigationPrice * 0.7) : null;
  const seniorMortgage = parsed.seniorMortgageAmount === null ? 0 : parsed.seniorMortgageAmount;
  const finalValue = Number.isFinite(collateralBase) ? Math.max(0, collateralBase - deposit - seniorMortgage) : null;
  const costApproach = calculateCostApproach(parsed.exclusiveArea);
  const incomeApproach = calculateIncomeApproach();
  const weightedValue = Number.isFinite(market.investigationPrice) && costApproach ? Math.round((market.investigationPrice * 0.7 + costApproach * 0.15 + incomeApproach * 0.15) / 1.0) : null;
  const confidence = tenant === '있음' && deposit === 0 ? '확인 필요' : '높음';

  document.getElementById('result').innerHTML = `
    <div class="grid gap-4 md:grid-cols-3">
      ${summaryCard('최종 조사가액', formatMoney(market.investigationPrice), market.appliedPriceType)}
      ${summaryCard('담보 인정가 70%', formatMoney(collateralBase), '조사가액 × 0.7', 'blue')}
      ${summaryCard('최종 담보가치', formatMoney(finalValue), '보증금·선순위 차감 후', 'dark')}
    </div>

    ${card('문서 판별 상태', `
      <div class="flex items-center gap-2"><span class="${badgeClass(parsed.documentValidation.tone)}">${parsed.documentValidation.status}</span><span class="text-sm text-slate-500">감지 키워드 ${parsed.documentValidation.found.length}개</span></div>
      <p class="text-xs text-slate-500 mt-3">OCR 실패를 바로 등기부등본 아님으로 판단하지 않고, 가능/확인 필요 단계로 처리합니다.</p>
    `)}

    ${card('자동 추출 결과', grid([
      ['주소', address || '주소 미입력'],
      ['소유자', parsed.owner],
      ['건물유형', `${parsed.buildingType} / ${parsed.detailType}`],
      ['건물번호', parsed.unitNumber],
      ['전유면적', parsed.exclusiveArea],
      ['해당 층', parsed.currentFloor ? `${parsed.currentFloor}층` : '확인 필요'],
      ['총 층수', parsed.totalFloors ? `${parsed.totalFloors}층` : '확인 필요'],
      ['중위층', parsed.medianFloor ? `${parsed.medianFloor}층` : '확인 필요'],
      ['등기부상 임차권리', parsed.registryTenantStatus],
      ['근저당 현황', parsed.mortgageStatus],
      ['선순위 근저당', formatMoney(parsed.seniorMortgageAmount)]
    ]))}

    ${card('시세 및 조사가액 분석', grid([
      ['시세 출처', market.marketPriceSource],
      ['데이터 건수', typeof market.transactionCount === 'number' ? `${market.transactionCount}건` : market.transactionCount],
      ['상위값', `${formatMoney(market.upperPrice)} / 산정 제외`],
      ['중위값', formatMoney(market.middlePrice)],
      ['하위값', formatMoney(market.lowerPrice)],
      ['적용 시세', market.appliedPriceType],
      ['층수 기준', market.apiConnected ? `${parsed.currentFloor || '확인 필요'}층 / 중위층 ${parsed.medianFloor || '확인 필요'}층 기준` : '공시가격 API 연결 후 산정 가능']
    ]))}

    ${card('감정평가 3방식 비교', `
      <div class="grid gap-3 md:grid-cols-3">
        ${methodCard('거래사례비교법', formatMoney(market.investigationPrice), '중심')}
        ${methodCard('원가법', formatMoney(costApproach), '검증')}
        ${methodCard('수익환원법', formatMoney(incomeApproach), '검증')}
      </div>
      <div class="mt-4 rounded-xl bg-slate-50 p-4 text-sm text-slate-600">
        거래사례비교법을 중심값으로 두고 원가법과 수익환원법은 검증 지표로 비교합니다. 가중 참고값은 <b>${formatMoney(weightedValue)}</b>이며, 담보평가에는 보수적으로 거래사례비교법 기준 조사가액을 우선 적용합니다.
      </div>
    `)}

    ${card('담보가치 계산 근거', `
      <p>담보 인정가 = ${formatMoney(market.investigationPrice)} × 70% = <b>${formatMoney(collateralBase)}</b></p>
      <p>적용 임차보증금 = <b>${formatMoney(deposit)}</b></p>
      <p>선순위 근저당 = <b>${formatMoney(parsed.seniorMortgageAmount)}</b></p>
      <p class="mt-3 rounded-xl bg-blue-50 p-3 font-bold text-blue-900">최종 담보가치 = ${formatMoney(collateralBase)} - ${formatMoney(deposit)} - ${formatMoney(parsed.seniorMortgageAmount)} = ${formatMoney(finalValue)}</p>
      <p class="mt-2 text-sm text-slate-500">결과 신뢰도: <b>${confidence}</b></p>
    `)}

    ${card('오류 및 유의사항', `
      <ul class="list-disc pl-5 text-sm text-slate-600 space-y-1">
        <li>본 결과는 참고용 추정값이며 금융기관 확정 심사값이 아닙니다.</li>
        <li>등기부등본만으로 일반 임차인 보증금은 확정할 수 없으므로 사용자 입력값을 우선 반영합니다.</li>
        <li>KB부동산 파싱/크롤링은 사용하지 않으며, 실제 서비스에서는 공공데이터포털 API를 서버리스 API로 연결해야 합니다.</li>
        <li>현재 프론트는 /api/official-price 서버리스 API를 호출합니다. 해당 API 라우트와 공시가격 API 키가 없으면 시세는 데이터 부재로 표시됩니다.</li>
      </ul>
    `)}
  `;
}

function summaryCard(title, value, sub, type='normal') {
  const cls = type === 'dark' ? 'bg-blue-700 text-white' : 'bg-white text-slate-900 border border-slate-200';
  const subCls = type === 'dark' ? 'text-blue-100' : 'text-slate-500';
  return `<div class="rounded-2xl p-5 shadow-sm ${cls}"><p class="text-sm ${subCls}">${title}</p><p class="text-2xl font-black mt-2">${value}</p><p class="text-xs ${subCls} mt-1">${sub}</p></div>`;
}

function card(title, body) {
  return `<div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200"><h3 class="font-bold mb-4">${title}</h3><div class="space-y-2 text-sm">${body}</div></div>`;
}

function grid(items) {
  return `<div class="grid gap-3 md:grid-cols-2">${items.map(([k,v]) => `<div class="rounded-xl bg-slate-50 p-3"><p class="text-xs text-slate-500">${k}</p><p class="font-bold mt-1">${v}</p></div>`).join('')}</div>`;
}

function methodCard(name, value, role) {
  const main = role === '중심';
  return `<div class="rounded-xl p-4 border ${main ? 'bg-blue-50 border-blue-200' : 'bg-slate-50 border-slate-200'}"><div class="flex justify-between"><b>${name}</b><span class="text-xs rounded-full px-2 py-1 ${main ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-600'}">${role}</span></div><p class="text-xl font-black mt-3">${value}</p></div>`;
}

function badgeClass(tone) {
  return tone === 'green'
    ? 'rounded-full bg-emerald-50 text-emerald-700 px-2 py-1 text-xs font-bold border border-emerald-200'
    : 'rounded-full bg-amber-50 text-amber-700 px-2 py-1 text-xs font-bold border border-amber-200';
}

document.getElementById('result').innerHTML = card('시작하기', '<p class="text-slate-600">주소를 입력하고 등기부등본 파일을 업로드한 뒤 결과 계산하기를 눌러주세요.</p>');
</script>
</body>
</html>
